name: Test on macOS

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: macos-latest
    
    strategy:
      matrix:
        node-version: [24.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install build dependencies
      run: brew install libffi pkg-config
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
      env:
        PKG_CONFIG_PATH: /opt/homebrew/opt/libffi/lib/pkgconfig
        LDFLAGS: -L/opt/homebrew/opt/libffi/lib
        CPPFLAGS: -I/opt/homebrew/opt/libffi/include
    
    - name: Run tests
      run: npm test
    
    - name: Verify module exports
      run: node -e "const mouse = require('./macmouse.js'); console.log('✓ Module exports working'); console.log('Available methods:', Object.keys(module.exports).join(', '))"
